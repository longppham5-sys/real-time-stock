apiVersion: kafka.strimzi.io/v1
kind: KafkaUser
metadata:
  name: consumer-user
  labels:
    strimzi.io/cluster: my-cluster
spec:
  authentication:
    type: tls
  authorization:
    type: simple
    acls:
      - resource:
          type: group
          name: my-group
          patternType: literal
        operations:
          - Read
        host: "*"