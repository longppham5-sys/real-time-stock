apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-hadoop-config
  namespace: {{ .Release.Namespace }}
data:
  core-site.xml: |
    <configuration>
      <property>
        <name>fs.defaultFS</name>
        <value>hdfs://{{ include "hadoop.fullname" . }}-hdfs-nn:9000/</value>
      </property>
    </configuration>
  hdfs-site.xml: |
    <configuration>
      <property>
        <name>dfs.client.use.datanode.hostname</name>
        <value>{{ .Values.hdfs.dataNode.UseDataNodeHostname }}</value>
      </property>
      <property>
        <name>dfs.datanode.use.datanode.hostname</name>
        <value>{{ .Values.hdfs.dataNode.UseDataNodeHostname }}</value>
      </property>
    </configuration>