apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: spark-pi
  namespace: default
spec:
  type: Python
  mode: cluster
  image: docker.io/library/spark:4.0.1
  imagePullPolicy: IfNotPresent
  mainApplicationFile: hdfs://my-hadoop-hadoop-hdfs-nn:9000/user/long/scripts/spark-processor.py
  arguments: []
  sparkConf:
    "spark.jars.packages": "org.apache.spark:spark-sql-kafka-0-10_2.12:4.0.1"
    "spark.sql.streaming.checkpointLocation": "hdfs://my-hadoop-hadoop-hdfs-nn:9000/user/long/checkpoints/"
    "spark.driver.extraJavaOptions": "-Divy.home=/tmp/.ivy -Dbolt.home=/tmp/.bolt"
    "spark.executor.extraJavaOptions": "-Divy.home=/tmp/.ivy -Dbolt.home=/tmp/.bolt"
  
  # KẾT NỐI HADOOP CỦA BẠN Ở ĐÂY
  hadoopConfigMap: "spark-hadoop-config" 
  hadoopConf:
    "fs.defaultFS": "hdfs://my-hadoop-hadoop-hdfs-nn:9000"
    "dfs.client.use.datanode.hostname": "true"

  driver:
    labels:
      version: 4.0.1
    cores: 1
    memory: 512m
    serviceAccount: spark-operater-spark-operator-spark 
    securityContext:
      capabilities:
        drop:
        - ALL
      runAsGroup: 185
      runAsUser: 185
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      seccompProfile:
        type: RuntimeDefault
  executor:
    labels:
      version: 4.0.1
    instances: 1
    cores: 1
    memory: 512m
    securityContext:
      capabilities:
        drop:
        - ALL
      runAsGroup: 185
      runAsUser: 185
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      seccompProfile:
        type: RuntimeDefault